<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="theme.css">
    <title>Sign Up - H7 Portal</title>
</head>
<body>
    <header class="main-header">
        <div class="header-title-box">
            <h1>H7 Portal</h1>
            <h3>New User Registration</h3>
        </div>
        <img src="image.png" alt="NIT logo" height="60" width="60" style="border-radius: 50%; border: 2px solid var(--secondary);">
    </header>

    <main class="center-box glass-panel" style="margin: 5rem auto;">
        <h2 class="text-center">Sign Up</h2>
        <p class="text-center" style="margin-bottom: 2rem; color: var(--text-dark);">Join the H7 community today.</p>

        <form id="signupForm">
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a strong password" required>
            </div>
            
            <div>
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
            </div>
            
            <fieldset style="margin-top: 1rem; border-color: rgba(255,255,255,0.05); background: rgba(0,0,0,0.2);">
                <legend style="font-size: 0.9rem;">Security Check</legend>
                <p id="captcha-question" class="captcha-box" style="text-align: center; color: var(--secondary);"></p>
                <input type="number" id="captcha-answer" placeholder="Enter answer here" required>
            </fieldset>

            <div class="error-msg text-center" id="errorMsg" style="min-height: 20px;"></div>
            
            <button type="submit" class="mt-1">Create Account</button>
            
            <div class="text-center mt-1">
                <a href="loginLeave.html">Already have an account? Login here.</a>
            </div>
        </form>
    </main>

    <script>
        let num1, num2, correctAnswer;
        function generateCaptcha() {
            num1 = Math.floor(Math.random() * 10) + 1;
            num2 = Math.floor(Math.random() * 10) + 1;
            correctAnswer = num1 + num2;
            document.getElementById('captcha-question').textContent = `What is ${num1} + ${num2}?`;
        }

        document.getElementById("signupForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const errorMsg = document.getElementById("errorMsg");
            const userAnswer = parseInt(document.getElementById('captcha-answer').value);

            if (password !== confirmPassword) {
                errorMsg.textContent = "Passwords do not match!";
                errorMsg.style.color = "#ef4444";
                return;
            }

            if (userAnswer !== correctAnswer) {
                errorMsg.textContent = "Incorrect security answer. Please try again.";
                errorMsg.style.color = "#ef4444";
                generateCaptcha();
                document.getElementById('captcha-answer').value = '';
                return;
            }

            errorMsg.style.color = "#10b981";
            errorMsg.textContent = "Signup successful! You can now login.";
            
            // Redirect after a short delay
            setTimeout(() => {
                window.location.href = "loginLeave.html";
            }, 1500);
        });
        generateCaptcha();
    </script>
</body>
</html>
